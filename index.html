<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vault</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app-wrapper">
  <section id="auth-screen" class="view active">
    <div class="auth-container">
      <h1>Vault</h1>
      <p>Cloud finance platform for personal + shared budgets</p>
      <form id="login-form">
        <input type="email" id="auth-email" placeholder="Email" required>
        <input type="password" id="auth-password" placeholder="Password" required minlength="6">

        <div class="auth-row">
          <label><input type="checkbox" id="auth-create-account"> Create account</label>
          <button id="btn-forgot-password" type="button" class="text-btn">Forgot password?</button>
        </div>

        <div class="admin-check">
          <input type="checkbox" id="auth-is-admin">
          <label for="auth-is-admin">Admin Registration</label>
        </div>
        <input type="password" id="auth-admin-code" placeholder="Admin Code (Optional)" style="display:none;">
        <button type="submit" id="btn-login">Continue</button>
      </form>
      <hr>
      <button id="btn-google-login">Sign in with Google</button>
    </div>
  </section>

  <section id="main-app" class="view" style="display:none;">
    <header id="app-header">
      <div class="header-left">
        <h2>Vault</h2>
        <small id="welcome-email"></small>
      </div>
      <div class="header-right">
        <button id="btn-privacy-toggle" title="Toggle Privacy Mode">👁️</button>
      </div>
    </header>

    <main id="view-dashboard" class="tab-content active">
      <div class="dashboard-grid">
        <div class="balance-card">
          <h3>Net Balance</h3>
          <h1 id="net-balance" class="currency">$0.00</h1>
        </div>
        <div class="balance-card">
          <h3>Month Income</h3>
          <h1 id="month-income" class="currency">$0.00</h1>
        </div>
        <div class="balance-card">
          <h3>Month Expense</h3>
          <h1 id="month-expense" class="currency">$0.00</h1>
        </div>
      </div>

      <div class="embed-block">
        <h3>Monthly Spend</h3>
        <div class="progress-bar-container"><div id="spend-progress" class="progress-bar"></div></div>
        <small id="spend-progress-label"></small>
      </div>

      <div class="embed-block">
        <h3>Recent Activity</h3>
        <div id="recent-activity"></div>
      </div>

      <button id="fab-add-transaction" class="fab">+</button>
    </main>

    <main id="view-plan" class="tab-content" style="display:none;">
      <div class="balance-card">
        <h3>Left to Budget</h3>
        <h1 id="left-to-budget" class="currency">$0.00</h1>
      </div>
      <div class="embed-block" id="budget-categories"></div>
    </main>

    <main id="view-ledger" class="tab-content" style="display:none;">
      <div class="embed-block">
        <input type="text" id="ledger-search" placeholder="Search transactions...">
        <div id="ledger-list"></div>
      </div>
    </main>

    <main id="view-settings" class="tab-content" style="display:none;">
      <div class="embed-block">
        <h3>Settings</h3>
        <label for="pref-currency">Currency</label>
        <select id="pref-currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="CAD">CAD</option>
        </select>

        <label for="pref-monthly-limit">Monthly Spend Limit</label>
        <input id="pref-monthly-limit" type="number" min="0" step="0.01" placeholder="3000">

        <label for="pref-theme">Theme</label>
        <select id="pref-theme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>

        <button id="btn-save-preferences">Save Preferences</button>

        <hr>
        <h4>Vault Link</h4>
        <input type="text" id="vault-link-uid" placeholder="Partner UID">
        <button id="btn-link-account">Link Account</button>
        <button id="btn-export-csv">Export Data (CSV)</button>

        <hr>
        <div id="admin-console" style="display:none;">
          <h4>Admin Console</h4>
          <p id="admin-summary">Loading...</p>
          <input type="text" id="admin-target-uid" placeholder="User UID for reset">
          <button id="btn-admin-user-reset">Reset User Transactions</button>
        </div>

        <hr>
        <button id="btn-logout" class="danger-btn">Secure Logout</button>
      </div>
    </main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-target="view-dashboard">🏠</button>
      <button class="nav-btn" data-target="view-plan">🎯</button>
      <button class="nav-btn" data-target="view-ledger">📖</button>
      <button class="nav-btn" data-target="view-settings">⚙️</button>
    </nav>
  </section>
</div>

<div id="transaction-modal" class="modal-shell" style="display:none;">
  <div class="modal-content">
    <h3>New Transaction</h3>
    <form id="form-transaction">
      <input type="number" id="trans-amount" placeholder="Amount" step="0.01" required>
      <select id="trans-type">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
      <input type="text" id="trans-merchant" placeholder="Merchant/Source" required>
      <input type="text" id="trans-category" placeholder="Category" required>
      <input type="date" id="trans-date">
      <textarea id="trans-notes" placeholder="Notes (optional)"></textarea>
      <button type="submit">Save</button>
      <button type="button" id="btn-close-modal" class="secondary">Cancel</button>
    </form>
  </div>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/db.js"></script>
<script type="module" src="js/plan.js"></script>
<script type="module" src="js/ledger.js"></script>
<script type="module" src="js/settings.js"></script>
</body>
</html>
